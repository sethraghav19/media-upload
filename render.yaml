services:
  - type: web
    name: whatsapp-media-upload
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
